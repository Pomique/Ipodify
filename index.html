<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<title>iPodify</title>
<script src="https://sdk.scdn.co/spotify-player.js"></script>
<style>
  :root{
    --shell-light:#f4f4f2;
    --shell-shadow:#c9c9c6;
    --shell-edge:#ffffff;
    --wheel-face:#efeeec;
    --wheel-shadow:#b9b8b5;
    --wheel-hi:#fbfbfa;
    --screen-bezel:#0a0a0a;
    --screen-glass:#dce4e6;
    --glass-a:#eef3f2;
    --glass-c:#c7d0d1;
    --center-a:#fdfdfd;
    --center-b:#e5e4e1;
    --center-active:#d7d6d3;
    --ink:#20242a;
    --ink-soft:#5b6169;
    --accent:#3f4a52;
    --btn-glyph:#4a4f55;
    --spotify:#1DB954;
  }
  :root.dark{
    --shell-light:#1c1c1e;
    --shell-shadow:#0a0a0b;
    --shell-edge:#3a3a3c;
    --wheel-face:#3a3a3c;
    --wheel-shadow:#161617;
    --wheel-hi:#4a4a4c;
    --screen-bezel:#000000;
    --screen-glass:#26312f;
    --glass-a:#2a3533;
    --glass-c:#1b2422;
    --center-a:#48484a;
    --center-b:#38383a;
    --center-active:#2c2c2e;
    --ink:#f0f0f0;
    --ink-soft:#9a9a9e;
    --accent:#5a6672;
    --btn-glyph:#d5d5d7;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    height:100%; margin:0;
    background:var(--shell-light);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
    overscroll-behavior:none;
  }
  #app{
    width:100%; height:100dvh;
  }
  .device{
    width:100%; height:100%;
    background:linear-gradient(160deg,var(--shell-edge),var(--shell-light) 40%, var(--shell-shadow));
    padding:calc(env(safe-area-inset-top,0px) + 18px) 22px calc(env(safe-area-inset-bottom,0px) + 22px);
    display:flex; flex-direction:column;
    position:relative;
  }
  .device::after{
    content:"";
    position:absolute; inset:0;
    border:1px solid rgba(0,0,0,.06);
    pointer-events:none;
  }

  /* Screen */
  .screen{
    background:var(--screen-bezel);
    border-radius:14px;
    padding:9px;
    box-shadow:0 2px 6px rgba(0,0,0,.5) inset, 0 1px 0 rgba(255,255,255,.4);
    margin-bottom:26px;
    flex:1;
    display:flex;
    min-height:0;
  }
  .glass{
    background:linear-gradient(165deg,var(--glass-a),var(--screen-glass) 60%,var(--glass-c));
    border-radius:6px;
    flex:1;
    display:flex; flex-direction:column;
    overflow:hidden;
    position:relative;
    min-height:0;
  }
  .statusbar{
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:600; color:var(--ink);
    padding:7px 10px 4px; min-height:16px;
    letter-spacing:.2px;
  }
  .now-playing-pill{display:none; align-items:center; gap:6px; cursor:pointer; max-width:100%; overflow:hidden; margin:0 auto;}
  .now-playing-pill.active{display:flex;}
  .np-pill-title{font-size:10.5px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px;}
  .eq-bars{display:flex; align-items:flex-end; gap:3px; height:14px; flex-shrink:0;}
  .eq-bars span{width:3px; background:var(--spotify); border-radius:1px; height:4px; animation:eq 0.9s ease-in-out infinite;}
  .eq-bars span:nth-child(1){animation-delay:0s;}
  .eq-bars span:nth-child(2){animation-delay:.2s;}
  .eq-bars span:nth-child(3){animation-delay:.4s;}
  .eq-bars span:nth-child(4){animation-delay:.1s;}
  @keyframes eq{
    0%,100%{height:4px;}
    50%{height:14px;}
  }
  .brand-mark{position:absolute; left:22px; bottom:14px; font-size:11px; letter-spacing:.5px; color:#7a7d82; font-weight:600;}
  .statusbar .dot{width:5px;height:5px;border-radius:50%;background:var(--spotify);display:inline-block;margin-right:5px;}
  .tracklist-btn{background:none; border:none; color:var(--ink); font-size:14px; padding:2px 4px; line-height:1;}
  .track-item{
    font-size:12px; color:var(--ink); padding:7px 4px; border-bottom:1px solid rgba(0,0,0,.08);
    display:flex; flex-direction:column; cursor:pointer;
  }
  .track-item .t-name{font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .track-item .t-artist{font-size:10.5px; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .track-item.playing{color:var(--spotify);}
  .track-item.playing .t-artist{color:var(--spotify);}
  .screen-body{flex:1; display:flex; flex-direction:column; padding:2px 12px 12px; min-height:0;}

  /* --- Home / menu view --- */
  .view{display:none; flex:1; flex-direction:column; min-height:0;}
  .view.active{display:flex;}

  .menu-title{font-size:13px; font-weight:700; color:var(--ink); text-align:center; margin-bottom:8px;}
  .menu-item{
    font-size:12.5px; color:var(--ink); padding:8px 4px; border-bottom:1px solid rgba(0,0,0,.08);
    display:flex; align-items:center; justify-content:space-between;
  }
  .menu-item:last-child{border-bottom:none;}
  .menu-item small{color:var(--ink-soft); font-weight:400;}

  .url-input{
    width:100%; font-size:12px; padding:7px 8px; border-radius:5px;
    border:1px solid #9aa3a3; background:#fff; color:var(--ink); margin-top:6px;
  }
  .go-btn{
    margin-top:8px; font-size:12px; font-weight:700; color:#fff;
    background:var(--accent); border:none; border-radius:5px; padding:7px;
    width:100%;
  }
  .hint{font-size:10.5px; color:var(--ink-soft); margin-top:8px; line-height:1.4;}
  .connect-btn{
    margin-top:auto; font-size:12.5px; font-weight:700; color:#fff;
    background:var(--spotify); border:none; border-radius:6px; padding:9px;
  }
  .bottom-actions{
    margin-top:auto; display:flex; justify-content:space-between; gap:8px; padding-top:10px;
  }
  .pill-btn{
    border:none; border-radius:14px; font-size:10.5px; font-weight:700; padding:6px 12px;
  }
  .pill-spotify{background:var(--spotify); color:#000;}
  .pill-reconnect{background:#000; color:#fff; text-decoration:underline;}
  .pill-dark{background:var(--accent); color:#fff;}
  .lyric-line{padding:5px 2px; opacity:.45; text-align:center; transition:opacity .2s, color .2s;}
  .lyric-line.active{opacity:1; font-weight:700; color:var(--spotify);}
  .status-msg{font-size:11px; color:var(--ink-soft); text-align:center; margin-top:8px; min-height:14px;}

  /* --- Now playing view --- */
  .np-art{
    width:92px; height:92px; border-radius:4px; margin:2px auto 8px;
    background:#4a4f55 center/cover no-repeat;
    box-shadow:0 3px 8px rgba(0,0,0,.25);
    flex-shrink:0;
  }
  .np-title-wrap, .np-artist-wrap{overflow:hidden; white-space:nowrap; width:100%; padding:0 4px; display:flex; justify-content:center;}
  .np-title-wrap.marquee, .np-artist-wrap.marquee{justify-content:flex-start;}
  .np-title{font-size:13.5px; font-weight:700; color:var(--ink); display:inline-block;}
  .np-artist{font-size:11.5px; color:var(--ink-soft); margin-top:1px; display:inline-block;}
  @keyframes marquee{
    0%, 15%{transform:translateX(0);}
    85%, 100%{transform:translateX(var(--marquee-distance,0));}
  }
  .np-times{display:flex; justify-content:space-between; font-size:9px; color:var(--ink-soft); padding:0 4px;}
  .np-playlist{font-size:10px; color:var(--ink-soft); text-align:center; margin-top:auto; padding-top:6px;}
  .fallback-hint{font-size:10px; color:#b3491f; text-align:center; padding-top:6px; line-height:1.5;}
  .fallback-hint a{color:var(--spotify); font-weight:700;}

  /* Click wheel */
  .wheel-wrap{display:flex; justify-content:center; margin-top:4px; flex-shrink:0;}
  .wheel{
    position:relative; width:min(72vw,260px); height:min(72vw,260px); border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--wheel-hi), var(--wheel-face) 55%, var(--wheel-shadow) 100%);
    box-shadow:0 4px 10px rgba(0,0,0,.25) inset, 0 2px 3px rgba(255,255,255,.7), 0 6px 14px rgba(0,0,0,.3);
    touch-action:none;
  }
  .wheel-btn{
    position:absolute; background:none; border:none; color:var(--btn-glyph);
    font-size:11px; font-weight:600; letter-spacing:.5px;
    display:flex; align-items:center; justify-content:center;
    width:64px; height:44px; cursor:pointer;
  }
  .wheel-btn:active{color:#000;}
  .wb-menu{top:8px; left:50%; transform:translateX(-50%);}
  .wb-prev{left:2px; top:50%; transform:translateY(-50%); flex-direction:column;}
  .wb-next{right:2px; top:50%; transform:translateY(-50%); flex-direction:column;}
  .wb-play{bottom:8px; left:50%; transform:translateX(-50%);}
  .wb-prev svg, .wb-next svg, .wb-play svg{width:14px; height:14px; fill:var(--btn-glyph);}

  .center-btn{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:82px; height:82px; border-radius:50%;
    background:linear-gradient(160deg,var(--center-a),var(--center-b));
    box-shadow:0 2px 4px rgba(0,0,0,.15), 0 1px 0 rgba(255,255,255,.9) inset;
    border:none; color:var(--ink-soft); font-size:10px; font-weight:600;
  }
  .center-btn:active{background:linear-gradient(160deg,var(--center-b),var(--center-active));}

  .np-seek{
    -webkit-appearance:none; appearance:none;
    width:100%; height:28px; margin:6px 0 0; background:transparent; cursor:pointer;
    touch-action:none;
  }
  .np-seek::-webkit-slider-runnable-track{
    height:3px; background:rgba(0,0,0,.18); border-radius:2px;
  }
  .np-seek::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none;
    width:16px; height:16px; border-radius:50%; margin-top:-6.5px;
    background:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.4);
  }

  .menu-item{cursor:pointer;}
  .menu-item.disabled{color:var(--ink-soft); cursor:default;}
  .spotify-open-btn{
    margin-top:auto; font-size:11.5px; font-weight:700; color:#fff;
    background:var(--spotify); border:none; border-radius:6px; padding:8px;
  }
</style>
</head>
<body>
<div id="app">
  <div class="device">

    <div class="screen">
      <div class="glass">
        <div class="statusbar" id="statusbar">
          <div class="now-playing-pill" id="now-playing-pill">
            <span class="eq-bars active"><span></span><span></span><span></span><span></span></span>
            <span class="np-pill-title" id="np-pill-title"></span>
          </div>
        </div>
        <div class="screen-body">

          <!-- MENU / CONNECT VIEW -->
          <div class="view active" id="view-menu">

          <!-- LYRICS VIEW -->

            <div id="lyrics-content" style="flex:1; overflow-y:auto; min-height:0; font-size:12px; line-height:1.6; white-space:pre-wrap; padding:0 2px;">
              <!-- filled by JS -->
            </div>
          </div>

          <!-- SEARCH VIEW -->
          <div class="view" id="view-search">
            <div class="menu-title">Rechercher</div>
            <input class="url-input" id="search-input" placeholder="Nom de playlist..." />
            <button class="go-btn" id="search-go-btn">Rechercher</button>
            <div id="search-results" style="flex:1; overflow-y:auto; min-height:0; margin-top:8px;">
              <!-- filled by JS -->
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- CLICK WHEEL -->
    <div class="wheel-wrap">
      <div class="wheel" id="wheel">
        <button class="wheel-btn wb-menu" id="btn-menu">MENU</button>
        <button class="wheel-btn wb-prev" id="btn-prev">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="wheel-btn wb-next" id="btn-next">
          <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
        </button>
        <button class="wheel-btn wb-play" id="btn-play">
          <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="center-btn" id="btn-select">SELECT</button>
      </div>
    </div>

    <div class="brand-mark">iPodify</div>
  </div>

<script>
if (localStorage.getItem("ipodify_dark") === "1") document.documentElement.classList.add("dark");

/* =========================================================
   CONFIGURATION — à remplir avant de déployer
   ========================================================= */
const CLIENT_ID = "c4babe4992884628b766f199b1569747";
const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPES = [
  "streaming",
  "user-read-email",
  "user-read-private",
  "user-read-playback-state",
  "user-modify-playback-state",
  "user-read-currently-playing",
  "playlist-read-private",
  "playlist-read-collaborative"
].join(" ");

/* =========================================================
   PKCE helpers
   ========================================================= */
function randomString(len){
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  let out = "";
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  for (let i=0;i<len;i++) out += chars[arr[i] % chars.length];
  return out;
}
async function sha256base64url(input){
  const data = new TextEncoder().encode(input);
  const digest = await crypto.subtle.digest("SHA-256", data);
  let str = "";
  const bytes = new Uint8Array(digest);
  for (let b of bytes) str += String.fromCharCode(b);
  return btoa(str).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}

/* =========================================================
   Auth state
   ========================================================= */
function saveTokens(t){
  const expiry = Date.now() + (t.expires_in*1000) - 10000;
  localStorage.setItem("ipodify_access", t.access_token);
  if (t.refresh_token) localStorage.setItem("ipodify_refresh", t.refresh_token);
  localStorage.setItem("ipodify_expiry", String(expiry));
}
function getAccessToken(){ return localStorage.getItem("ipodify_access"); }
function getRefreshToken(){ return localStorage.getItem("ipodify_refresh"); }
function tokenExpired(){
  const exp = parseInt(localStorage.getItem("ipodify_expiry")||"0",10);
  return Date.now() > exp;
}

async function startLogin(){
  const verifier = randomString(64);
  sessionStorage.setItem("ipodify_verifier", verifier);
  const challenge = await sha256base64url(verifier);
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: "code",
    redirect_uri: REDIRECT_URI,
    scope: SCOPES,
    code_challenge_method: "S256",
    code_challenge: challenge
  });
  window.location.href = "https://accounts.spotify.com/authorize?" + params.toString();
}

async function exchangeCodeForToken(code){
  const verifier = sessionStorage.getItem("ipodify_verifier");
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: "authorization_code",
    code, redirect_uri: REDIRECT_URI,
    code_verifier: verifier
  });
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body
  });
  if (!res.ok) throw new Error("token exchange failed");
  const t = await res.json();
  saveTokens(t);
}

async function refreshAccessToken(){
  const refresh_token = getRefreshToken();
  if (!refresh_token) return false;
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: "refresh_token",
    refresh_token
  });
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body
  });
  if (!res.ok) return false;
  const t = await res.json();
  saveTokens(t);
  return true;
}

async function apiFetch(path, opts={}){
  if (tokenExpired()) await refreshAccessToken();
  const res = await fetch("https://api.spotify.com/v1"+path, {
    ...opts,
    headers:{
      "Authorization":"Bearer "+getAccessToken(),
      "Content-Type":"application/json",
      ...(opts.headers||{})
    }
  });
  if (res.status === 401){
    const ok = await refreshAccessToken();
    if (ok){
      return fetch("https://api.spotify.com/v1"+path, {
        ...opts,
        headers:{"Authorization":"Bearer "+getAccessToken(),"Content-Type":"application/json",...(opts.headers||{})}
      });
    }
  }
  return res;
}

/* =========================================================
   Web Playback SDK — permet de jouer le son directement
   dans la page, sans ouvrir l'appli Spotify (limité au
   premier plan sur iOS, cf. restrictions Apple)
   ========================================================= */
let webPlayer = null;
let webPlayerDeviceId = null;
let webPlayerReady = false;

async function spotifyOAuthTokenCallback(cb){
  if (tokenExpired()) await refreshAccessToken();
  cb(getAccessToken());
}

function initWebPlayer(){
  if (webPlayer || typeof Spotify === "undefined" || !getAccessToken()) return;
  webPlayer = new Spotify.Player({
    name: "iPodify",
    getOAuthToken: (cb)=>{ spotifyOAuthTokenCallback(cb); },
    volume: 1
  });
  webPlayer.addListener("ready", ({device_id})=>{
    webPlayerDeviceId = device_id;
    webPlayerReady = true;
  });
  webPlayer.addListener("not_ready", ()=>{ webPlayerReady = false; });
  webPlayer.addListener("initialization_error", ()=>{ webPlayerReady = false; });
  webPlayer.addListener("authentication_error", ()=>{ webPlayerReady = false; });
  webPlayer.addListener("account_error", ()=>{ webPlayerReady = false; });
  webPlayer.connect();
}
window.onSpotifyWebPlaybackSDKReady = initWebPlayer;

async function checkPlaybackStarted(){
  await new Promise(r=>setTimeout(r, 2500));
  const hint = document.getElementById("fallback-hint");
  try{
    const res = await apiFetch("/me/player");
    if (res.status === 204){ hint.style.display = "block"; return; }
    const data = await res.json();
    hint.style.display = (data && data.is_playing) ? "none" : "block";
  } catch(e){
    hint.style.display = "block";
  }
}

/* =========================================================
   UI plumbing
   ========================================================= */
const viewMenu = document.getElementById("view-menu");
const viewPlayer = document.getElementById("view-player");
const viewTracklist = document.getElementById("view-tracklist");
const viewLyrics = document.getElementById("view-lyrics");
const viewSearch = document.getElementById("view-search");
const menuContent = document.getElementById("menu-content");
let currentPlaylistId = null;
let currentTrackName = "";
let currentArtistName = "";
let isPlayingGlobal = false;
let lastKnownProgressMs = 0;
let lastKnownProgressAt = Date.now();
function showView(v){
  viewMenu.classList.remove("active");
  viewPlayer.classList.remove("active");
  viewTracklist.classList.remove("active");
  viewLyrics.classList.remove("active");
  viewSearch.classList.remove("active");
  v.classList.add("active");
}

function renderConnectScreen(){
  menuContent.innerHTML = `
    <div class="hint">Connecte ton compte Spotify pour piloter la lecture depuis cette appli.</div>
    <button class="connect-btn" id="connect-btn">Se connecter à Spotify</button>
    <div class="status-msg" id="status-msg"></div>
  `;
  document.getElementById("connect-btn").addEventListener("click", startLogin);
}

/* --- Playlist memory (up to 6 saved playlists) --- */
function loadPlaylists(){
  try{ return JSON.parse(localStorage.getItem("ipodify_playlists")||"[]"); }catch(e){ return []; }
}
function savePlaylists(list){
  localStorage.setItem("ipodify_playlists", JSON.stringify(list.slice(0,8)));
}
async function fetchPlaylistName(id){
  try{
    const res = await apiFetch("/playlists/"+id+"?fields=name");
    if (res.ok){ const j = await res.json(); return j.name || "Playlist"; }
  }catch(e){}
  return "Playlist";
}
function rememberPlaylist(id, name){
  let list = loadPlaylists().filter(p=>p.id!==id);
  list.unshift({id, name});
  savePlaylists(list);
}

async function autoImportPlaylists(){
  try{
    const res = await apiFetch("/me/playlists?limit=8");
    if (!res.ok) return;
    const json = await res.json();
    const items = (json.items || []).filter(Boolean);
    if (!items.length) return;
    let list = loadPlaylists();
    items.forEach(pl=>{
      if (!list.find(p=>p.id===pl.id)){
        list.push({id: pl.id, name: pl.name});
      }
    });
    savePlaylists(list);
    if (viewMenu.classList.contains("active")) renderPlaylistScreen();
  } catch(e){ /* silent */ }
}

function renderPlaylistScreen(){
  const saved = loadPlaylists();
  const itemsHtml = saved.map(p=>`
    <div class="menu-item" data-id="${p.id}">
      <span>${p.name}</span><small>▸</small>
    </div>
  `).join("");
  menuContent.innerHTML = `
    ${saved.length ? itemsHtml : '<div class="hint">Aucune playlist enregistrée pour le moment.</div>'}
    <div class="menu-item" id="add-playlist-item"><span>+ Nouvelle playlist</span><small>▸</small></div>
    <div class="menu-item" id="search-playlist-item"><span>🔍 Rechercher une playlist</span><small>▸</small></div>
    <div id="add-form" style="display:none;">
      <div class="hint">Colle le lien d'une playlist Spotify :</div>
      <input class="url-input" id="playlist-url" placeholder="https://open.spotify.com/playlist/..." />
      <button class="go-btn" id="go-btn">Lancer la lecture</button>
    </div>
    <div class="status-msg" id="status-msg"></div>
    <div class="bottom-actions">
      <button class="pill-btn pill-spotify" id="open-spotify-btn">Spotify</button>
      <button class="pill-btn pill-dark" id="dark-toggle-btn">🌙</button>
      <button class="pill-btn pill-reconnect" id="reconnect-link">Se reconnecter à Spotify</button>
    </div>
  `;
  document.getElementById("search-playlist-item").addEventListener("click", ()=>{
    showView(viewSearch);
    document.getElementById("search-results").innerHTML = "";
    document.getElementById("search-input").value = "";
  });
  document.getElementById("dark-toggle-btn").addEventListener("click", ()=>{
    document.documentElement.classList.toggle("dark");
    localStorage.setItem("ipodify_dark", document.documentElement.classList.contains("dark") ? "1" : "0");
  });
  document.getElementById("reconnect-link").addEventListener("click", ()=>{
    localStorage.removeItem("ipodify_access");
    localStorage.removeItem("ipodify_refresh");
    localStorage.removeItem("ipodify_expiry");
    startLogin();
  });
  saved.forEach(p=>{
    menuContent.querySelector(`[data-id="${p.id}"]`).addEventListener("click", ()=>launchPlaylistById(p.id, p.name));
  });
  document.getElementById("add-playlist-item").addEventListener("click", ()=>{
    document.getElementById("add-form").style.display = "block";
  });
  document.getElementById("go-btn").addEventListener("click", onLaunchPlaylist);
  document.getElementById("open-spotify-btn").addEventListener("click", ()=>{
    window.location.href = "spotify://";
  });
}

function extractPlaylistId(url){
  const m = url.match(/playlist[\/:]([a-zA-Z0-9]+)/);
  return m ? m[1] : null;
}

async function onLaunchPlaylist(){
  const url = document.getElementById("playlist-url").value.trim();
  const id = extractPlaylistId(url);
  if (!id){
    document.getElementById("status-msg").textContent = "Lien de playlist invalide.";
    return;
  }
  const name = await fetchPlaylistName(id);
  rememberPlaylist(id, name);
  launchPlaylistById(id, name);
}

async function launchPlaylistById(id, name){
  const statusEl = document.getElementById("status-msg");
  document.getElementById("fallback-hint").style.display = "none";
  statusEl.textContent = "Connexion en cours...";
  try{
    let deviceId = null;
    if (webPlayer && webPlayerReady && webPlayerDeviceId){
      try{ webPlayer.activateElement(); }catch(e){}
      deviceId = webPlayerDeviceId;
    } else {
      const devicesRes = await apiFetch("/me/player/devices");
      const devicesJson = await devicesRes.json();
      const devices = devicesJson.devices || [];
      if (devices.length === 0){
        statusEl.textContent = "Ouvre l'appli Spotify une fois sur ce téléphone (bouton ci-dessous), puis réessaie.";
        return;
      }
      const device = devices.find(d=>d.is_active) || devices[0];
      deviceId = device.id;
    }
    const playRes = await apiFetch("/me/player/play?device_id="+deviceId, {
      method:"PUT",
      body: JSON.stringify({ context_uri: "spotify:playlist:"+id })
    });
    if (playRes.status === 204 || playRes.ok){
      rememberPlaylist(id, name);
      currentPlaylistId = id;
      showView(viewPlayer);
      startPolling();
      checkPlaybackStarted();
    } else {
      statusEl.textContent = "Impossible de lancer la lecture (Premium requis).";
    }
  } catch(e){
    statusEl.textContent = "Erreur réseau, réessaie.";
  }
}

/* --- Paroles synchronisées --- */
let lyricsLines = [];

function parseLRC(lrc){
  const lines = [];
  lrc.split("\n").forEach(line=>{
    const m = line.match(/\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
    if (m){
      const time = parseInt(m[1],10)*60 + parseFloat(m[2]);
      const text = m[3].trim();
      if (text) lines.push({time, text});
    }
  });
  return lines.sort((a,b)=>a.time-b.time);
}

function estimateProgressSec(){
  const ms = isPlayingGlobal ? lastKnownProgressMs + (Date.now()-lastKnownProgressAt) : lastKnownProgressMs;
  return ms/1000;
}

function updateLyricsHighlight(){
  if (!lyricsLines.length) return;
  const t = estimateProgressSec();
  let activeIndex = 0;
  for (let i=0;i<lyricsLines.length;i++){
    if (lyricsLines[i].time <= t) activeIndex = i; else break;
  }
  const container = document.getElementById("lyrics-content");
  const prevActive = container.querySelector(".lyric-line.active");
  if (prevActive) prevActive.classList.remove("active");
  const el = container.querySelector(`.lyric-line[data-i="${activeIndex}"]`);
  if (el){
    el.classList.add("active");
    el.scrollIntoView({block:"center", behavior:"smooth"});
  }
}

async function renderLyrics(){
  const container = document.getElementById("lyrics-content");
  lyricsLines = [];
  if (!currentTrackName || !currentArtistName){
    container.textContent = "Aucune paroles disponible.";
    return;
  }
  container.textContent = "Chargement...";
  try{
    const params = new URLSearchParams({ artist_name: currentArtistName, track_name: currentTrackName });
    const res = await fetch("https://lrclib.net/api/get?"+params.toString());
    if (!res.ok){
      container.textContent = "Aucune paroles disponible.";
      return;
    }
    const json = await res.json();
    if (json && json.syncedLyrics){
      lyricsLines = parseLRC(json.syncedLyrics);
      if (lyricsLines.length){
        container.innerHTML = lyricsLines.map((l,i)=>`<div class="lyric-line" data-i="${i}">${l.text}</div>`).join("");
        updateLyricsHighlight();
        return;
      }
    }
    if (json && json.plainLyrics && json.plainLyrics.trim()){
      container.textContent = json.plainLyrics.trim();
    } else {
      container.textContent = "Aucune paroles disponible.";
    }
  } catch(e){
    container.textContent = "Aucune paroles disponible.";
  }
}

/* --- Liste des titres de la playlist en cours --- */
async function renderTrackList(){
  const container = document.getElementById("tracklist-content");
  if (!currentPlaylistId){
    container.innerHTML = '<div class="hint">Aucune playlist chargée.</div>';
    return;
  }
  container.innerHTML = '<div class="hint">Chargement...</div>';
  try{
    const res = await apiFetch("/playlists/"+currentPlaylistId+"/items?fields=items(item(name,uri,duration_ms,artists(name)))&limit=100");
    if (!res.ok){
      container.innerHTML = '<div class="hint">Impossible de charger les titres (playlist non personnelle ou restriction API).</div>';
      return;
    }
    const json = await res.json();
    const entries = json.items || [];
    if (!entries.length){
      container.innerHTML = '<div class="hint">Playlist vide.</div>';
      return;
    }
    container.innerHTML = entries.map((en, i)=>{
      const track = en.item;
      if (!track) return "";
      const artists = (track.artists||[]).map(a=>a.name).join(", ");
      return `<div class="track-item" data-uri="${track.uri}">
        <span class="t-name">${track.name}</span>
        <span class="t-artist">${artists}</span>
      </div>`;
    }).join("");
    container.querySelectorAll(".track-item").forEach(el=>{
      el.addEventListener("click", ()=>playTrackByUri(el.dataset.uri));
    });
  } catch(e){
    container.innerHTML = '<div class="hint">Erreur réseau, réessaie.</div>';
  }
}
async function playTrackByUri(uri){
  try{
    const devicesRes = await apiFetch("/me/player/devices");
    const devicesJson = await devicesRes.json();
    const devices = devicesJson.devices || [];
    if (!devices.length) return;
    const device = devices.find(d=>d.is_active) || devices[0];
    await apiFetch("/me/player/play?device_id="+device.id, {
      method:"PUT",
      body: JSON.stringify({ context_uri: "spotify:playlist:"+currentPlaylistId, offset:{ uri } })
    });
    showView(viewPlayer);
    startPolling();
  } catch(e){ /* silent */ }
}

/* --- Recherche de playlists --- */
async function renderSearchResults(query){
  const container = document.getElementById("search-results");
  if (!query.trim()){
    container.innerHTML = "";
    return;
  }
  container.innerHTML = '<div class="hint">Recherche...</div>';
  try{
    const res = await apiFetch("/search?type=playlist&limit=10&q="+encodeURIComponent(query));
    if (!res.ok){
      container.innerHTML = '<div class="hint">Erreur de recherche.</div>';
      return;
    }
    const json = await res.json();
    const items = (json.playlists && json.playlists.items || []).filter(Boolean);
    if (!items.length){
      container.innerHTML = '<div class="hint">Aucun résultat.</div>';
      return;
    }
    container.innerHTML = items.map(pl=>`
      <div class="menu-item" data-id="${pl.id}" data-name="${(pl.name||"Playlist").replace(/"/g,'&quot;')}">
        <span>${pl.name}</span><small>▸</small>
      </div>
    `).join("");
    container.querySelectorAll(".menu-item").forEach(el=>{
      el.addEventListener("click", ()=>{
        const id = el.dataset.id, name = el.dataset.name;
        rememberPlaylist(id, name);
        launchPlaylistById(id, name);
      });
    });
  } catch(e){
    container.innerHTML = '<div class="hint">Erreur réseau.</div>';
  }
}

/* --- Marquee (carrousel) pour les textes trop longs --- */
function setMarqueeText(wrapId, textId, text){
  const wrap = document.getElementById(wrapId);
  const el = document.getElementById(textId);
  el.textContent = text;
  el.style.animation = "none";
  el.style.transform = "translateX(0)";
  wrap.classList.remove("marquee");
  requestAnimationFrame(()=>{
    const overflow = el.scrollWidth - wrap.clientWidth;
    if (overflow > 4){
      wrap.classList.add("marquee");
      el.style.setProperty("--marquee-distance", (-overflow-6)+"px");
      const duration = Math.max(4, overflow/22);
      el.style.animation = `marquee ${duration}s ease-in-out 1s infinite`;
    }
  });
}

/* --- Now playing: un seul ticker local (1s) pilote l'UI, le réseau n'est interrogé
   que toutes les 4s pour rester synchronisé sans multiplier les requêtes --- */
let pollTimer = null;
let uiTickTimer = null;
let isSeeking = false;
let skipTriggered = false;
let currentTrackKey = "";
function fmtTime(ms){
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const rem = s%60;
  return m+":"+String(rem).padStart(2,"0");
}

function updateNowPlayingPill(){
  const pill = document.getElementById("now-playing-pill");
  pill.classList.toggle("active", isPlayingGlobal);
  if (isPlayingGlobal) document.getElementById("np-pill-title").textContent = currentTrackName;
}

function tickUi(){
  const durMs = parseFloat(document.getElementById("np-seek").max) || 0;
  if (isPlayingGlobal){
    const estMs = Math.min(lastKnownProgressMs + (Date.now()-lastKnownProgressAt), durMs || Infinity);
    if (!isSeeking && viewPlayer.classList.contains("active")){
      document.getElementById("np-seek").value = estMs;
      document.getElementById("np-elapsed").textContent = fmtTime(estMs);
    }
    if (durMs && (durMs - estMs) <= 900 && !skipTriggered){
      skipTriggered = true;
      apiFetch("/me/player/next", {method:"POST"}).then(()=>setTimeout(refreshNowPlaying, 300));
    }
  }
  if (viewLyrics.classList.contains("active") && lyricsLines.length) updateLyricsHighlight();
}

async function refreshNowPlaying(){
  try{
    const res = await apiFetch("/me/player/currently-playing");
    if (res.status === 204){
      document.getElementById("np-status").textContent = "Rien en lecture";
      isPlayingGlobal = false;
      updateNowPlayingPill();
      return;
    }
    const data = await res.json();
    if (!data || !data.item) return;
    const item = data.item;
    isPlayingGlobal = !!data.is_playing;
    lastKnownProgressMs = data.progress_ms || 0;
    lastKnownProgressAt = Date.now();
    const trackKey = item.id || item.name;
    if (trackKey !== currentTrackKey){
      currentTrackKey = trackKey;
      skipTriggered = false;
    }
    setMarqueeText("np-title-wrap", "np-title", item.name);
    setMarqueeText("np-artist-wrap", "np-artist", item.artists.map(a=>a.name).join(", "));
    currentTrackName = item.name;
    currentArtistName = item.artists && item.artists[0] ? item.artists[0].name : "";
    updateNowPlayingPill();
    const art = item.album.images && item.album.images[0] ? item.album.images[0].url : "";
    document.getElementById("np-art").style.backgroundImage = art ? `url(${art})` : "none";
    const seekEl = document.getElementById("np-seek");
    seekEl.max = item.duration_ms || 0;
    if (!isSeeking) seekEl.value = data.progress_ms || 0;
    document.getElementById("np-elapsed").textContent = fmtTime(data.progress_ms||0);
    document.getElementById("np-duration").textContent = fmtTime(item.duration_ms||0);
    document.getElementById("np-status").textContent = data.is_playing ? "Lecture en cours" : "En pause";
    if (data.is_playing) document.getElementById("fallback-hint").style.display = "none";
    document.getElementById("play-icon").innerHTML = data.is_playing
      ? '<path d="M7 5h4v14H7zm6 0h4v14h-4z"/>'
      : '<path d="M8 5v14l11-7z"/>';
  } catch(e){ /* silent */ }
}
function startPolling(){
  refreshNowPlaying();
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(refreshNowPlaying, 4000);
  if (uiTickTimer) clearInterval(uiTickTimer);
  uiTickTimer = setInterval(tickUi, 1000);
}

document.getElementById("now-playing-pill").addEventListener("click", ()=>{
  showView(viewPlayer);
});

/* --- Rattrapage quand l'onglet revient au premier plan (iOS suspend le JS en arrière-plan,
   ce qui empêche parfois le passage automatique à la musique suivante) --- */
document.addEventListener("visibilitychange", ()=>{
  if (document.visibilityState === "visible" && pollTimer){
    refreshNowPlaying();
  }
});

/* --- Wheel controls --- */
document.getElementById("btn-menu").addEventListener("click", ()=>{
  if (viewSearch.classList.contains("active")){
    showView(viewMenu);
    renderPlaylistScreen();
    return;
  }
  if (viewTracklist.classList.contains("active") || viewLyrics.classList.contains("active")){
    showView(viewPlayer);
    return;
  }
  showView(viewMenu);
  renderPlaylistScreen();
});
document.getElementById("btn-tracklist").addEventListener("click", ()=>{
  showView(viewTracklist);
  renderTrackList();
});
document.getElementById("btn-play").addEventListener("click", async ()=>{
  const playing = document.getElementById("np-status").textContent === "Lecture en cours";
  await apiFetch("/me/player/"+(playing?"pause":"play"), {method:"PUT"});
  setTimeout(refreshNowPlaying, 400);
});
document.getElementById("btn-select").addEventListener("click", ()=>{
  showView(viewLyrics);
  renderLyrics();
});
document.getElementById("btn-next").addEventListener("click", async ()=>{
  await apiFetch("/me/player/next", {method:"POST"});
  setTimeout(refreshNowPlaying, 500);
});
document.getElementById("btn-prev").addEventListener("click", async ()=>{
  await apiFetch("/me/player/previous", {method:"POST"});
  setTimeout(refreshNowPlaying, 500);
});
const seekEl = document.getElementById("np-seek");
let seekDragging = false;
function updateSeekFromPointer(e){
  const rect = seekEl.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX-rect.left)/rect.width));
  const max = parseFloat(seekEl.max) || 1;
  seekEl.value = Math.floor(ratio*max);
}
seekEl.addEventListener("pointerdown", (e)=>{
  seekDragging = true; isSeeking = true;
  seekEl.setPointerCapture(e.pointerId);
  updateSeekFromPointer(e);
});
seekEl.addEventListener("pointermove", (e)=>{
  if (seekDragging) updateSeekFromPointer(e);
});
seekEl.addEventListener("pointerup", async (e)=>{
  if (!seekDragging) return;
  seekDragging = false;
  updateSeekFromPointer(e);
  const pos = parseInt(seekEl.value, 10);
  await apiFetch("/me/player/seek?position_ms="+pos, {method:"PUT"});
  setTimeout(()=>{ isSeeking = false; refreshNowPlaying(); }, 500);
});

document.getElementById("np-open-spotify").addEventListener("click", ()=>{
  window.location.href = "spotify://";
});
document.getElementById("search-go-btn").addEventListener("click", ()=>{
  renderSearchResults(document.getElementById("search-input").value);
});

/* =========================================================
   Boot sequence
   ========================================================= */
(async function boot(){
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get("code");
  if (code){
    renderConnectScreen();
    document.getElementById("status-msg").textContent = "Connexion en cours...";
    try{
      await exchangeCodeForToken(code);
      window.history.replaceState({}, document.title, window.location.pathname);
    } catch(e){
      document.getElementById("status-msg").textContent = "Échec de connexion, réessaie.";
      return;
    }
  }

  if (!getAccessToken()){
    renderConnectScreen();
    return;
  }

  if (tokenExpired()){
    const ok = await refreshAccessToken();
    if (!ok){ renderConnectScreen(); return; }
  }

  renderPlaylistScreen();
  initWebPlayer();
  autoImportPlaylists();
  startPolling();
})();
</script>
