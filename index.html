<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>iPodify</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #1c1c1e;
      color: #333;
    }

    /* Conteneur Plein Écran */
    #app {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: linear-gradient(180deg, #3a3d40 0%, #181a1b 100%);
      padding: env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 20px) 16px;
    }

    /* --- ÉCRAN IPOD --- */
    .screen-container {
      width: 100%;
      max-width: 360px;
      flex: 1;
      max-height: 48%;
      background: #c3d3c0; /* Teinte LCD monochrome classique */
      border: 4px solid #2d3032;
      border-radius: 12px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 4px 10px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      margin-top: 10px;
    }

    /* En-tête Écran */
    .screen-header {
      height: 26px;
      background: linear-gradient(180deg, #a8bba4 0%, #8f9e8b 100%);
      border-bottom: 1px solid #7a8877;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      font-size: 13px;
      font-weight: bold;
      color: #1a2219;
    }

    .settings-btn {
      background: none;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }

    /* Corps Écran */
    .screen-body {
      flex: 1;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    /* CARROUSEL / MARQUEE POUR TITRE TROP LONG */
    .marquee-container {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
      margin-bottom: 2px;
    }

    .marquee-text {
      display: inline-block;
      font-size: 16px;
      font-weight: bold;
      color: #111;
      padding-left: 0%;
      animation: marquee 10s linear infinite;
    }

    @keyframes marquee {
      0% { transform: translateX(0%); }
      15% { transform: translateX(0%); }
      85% { transform: translateX(-50%); }
      100% { transform: translateX(-50%); }
    }

    .artist-name {
      font-size: 13px;
      color: #333;
      margin-bottom: 8px;
      text-align: center;
    }

    /* Milieu Écran: Pochette & Icône Molette */
    .now-playing-center {
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex: 1;
      margin: 5px 0;
    }

    .album-art {
      width: 80px;
      height: 80px;
      background: #9fae9c;
      border: 1px solid #6c7969;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #444;
      text-align: center;
      object-fit: cover;
    }

    .screen-wheel-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #6c7969;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #555;
      background: rgba(0,0,0,0.05);
    }

    /* Barre de Progression */
    .progress-container {
      width: 100%;
      margin-top: 6px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 10px;
      background: #a1b29f;
      border: 1px solid #6c7969;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      width: 35%;
      height: 100%;
      background: #2a3528;
    }

    .time-stamps {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #222;
      margin-top: 2px;
    }

    /* --- MOLETTE CLICK WHEEL --- */
    .wheel-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-height: 48%;
      padding: 10px 0;
    }

    .click-wheel {
      width: 250px;
      height: 250px;
      background: #2c2c2e;
      border-radius: 50%;
      position: relative;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 2px 5px rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wheel-btn {
      position: absolute;
      color: #a5a5a7;
      font-size: 13px;
      font-weight: bold;
      background: none;
      border: none;
      cursor: pointer;
    }

    .btn-menu { top: 18px; }
    .btn-prev { left: 18px; }
    .btn-next { right: 18px; }
    .btn-play { bottom: 18px; }

    .center-button {
      width: 85px;
      height: 85px;
      background: #1c1c1e;
      border-radius: 50%;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), 0 1px 2px rgba(255,255,255,0.1);
      border: none;
      cursor: pointer;
    }

    /* --- FENÊTRE RÉGLAGES (6 PLAYLISTS) --- */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: #f2f2f7;
      width: 100%;
      max-width: 340px;
      padding: 20px;
      border-radius: 14px;
      box-sizing: border-box;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-content h3 {
      text-align: center;
      margin-bottom: 12px;
    }

    .playlist-input {
      width: 100%;
      padding: 8px 10px;
      margin: 5px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      box-sizing: border-box;
    }

    .btn-save-modal {
      width: 100%;
      padding: 10px;
      background-color: #1ed760;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      margin-top: 12px;
      cursor: pointer;
    }

    .btn-close-modal {
      width: 100%;
      padding: 8px;
      background-color: #8e8e93;
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="app">
    <!-- Écran LCD iPod -->
    <div class="screen-container">
      <div class="screen-header">
        <span>Lecteur</span>
        <button class="settings-btn" onclick="openSettings()">⚙️</button>
      </div>

      <div class="screen-body">
        <!-- Défilement Carrousel / Marquee pour le Titre -->
        <div class="marquee-container">
          <div class="marquee-text" id="track-title">
            Bohemian Rhapsody - Remastered 2011 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Bohemian Rhapsody - Remastered 2011
          </div>
        </div>

        <div class="artist-name" id="artist-name">Queen</div>

        <div class="now-playing-center">
          <div class="album-art" id="album-art">Pochette</div>
          <div class="screen-wheel-icon">MENU</div>
        </div>

        <div class="progress-container">
          <div class="progress-bar-bg">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="time-stamps">
            <span id="time-current">1:34</span>
            <span id="time-remaining">-2:21</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Click Wheel iPod -->
    <div class="wheel-container">
      <div class="click-wheel">
        <button class="wheel-btn btn-menu" onclick="handleControl('MENU')">MENU</button>
        <button class="wheel-btn btn-prev" onclick="handleControl('PREV')">⏮</button>
        <button class="wheel-btn btn-next" onclick="handleControl('NEXT')">⏭</button>
        <button class="wheel-btn btn-play" onclick="handleControl('PLAY')">►❚❚</button>
        <button class="center-button" onclick="handleControl('SELECT')"></button>
      </div>
    </div>
  </div>

  <!-- Modal Réglages 6 Playlists -->
  <div class="modal" id="settings-modal">
    <div class="modal-content">
      <h3>⚙️ Mes 6 Playlists</h3>
      <input type="text" id="p1" class="playlist-input" placeholder="Lien / ID Playlist 1">
      <input type="text" id="p2" class="playlist-input" placeholder="Lien / ID Playlist 2">
      <input type="text" id="p3" class="playlist-input" placeholder="Lien / ID Playlist 3">
      <input type="text" id="p4" class="playlist-input" placeholder="Lien / ID Playlist 4">
      <input type="text" id="p5" class="playlist-input" placeholder="Lien / ID Playlist 5">
      <input type="text" id="p6" class="playlist-input" placeholder="Lien / ID Playlist 6">

      <button class="btn-save-modal" onclick="sauvegarderPlaylists()">Sauvegarder</button>
      <button class="btn-close-modal" onclick="closeSettings()">Fermer</button>
    </div>
  </div>

  <script>
    window.onload = function() {
      chargerPlaylists();
    };

    function openSettings() {
      document.getElementById('settings-modal').style.display = 'flex';
    }

    function closeSettings() {
      document.getElementById('settings-modal').style.display = 'none';
    }

    // Charger les playlists sauvegardées sur l'appareil
    function chargerPlaylists() {
      const sauvegardes = JSON.parse(localStorage.getItem('ipodify_playlists'));
      if (sauvegardes) {
        for (let i = 0; i < 6; i++) {
          if (sauvegardes[i]) {
            document.getElementById(`p${i + 1}`).value = sauvegardes[i];
          }
        }
      }
    }

    // Sauvegarder les 6 playlists sur le téléphone
    function sauvegarderPlaylists() {
      const mesPlaylists = [
        document.getElementById('p1').value,
        document.getElementById('p2').value,
        document.getElementById('p3').value,
        document.getElementById('p4').value,
        document.getElementById('p5').value,
        document.getElementById('p6').value
      ];

      localStorage.setItem('ipodify_playlists', JSON.stringify(mesPlaylists));
      alert('Playlists enregistrées sur ton téléphone !');
      closeSettings();
    }

    // Mettre à jour le titre avec le carrousel automatique
    function setTrackInfo(title, artist) {
      const titleElem = document.getElementById('track-title');
      document.getElementById('artist-name').textContent = artist;
      titleElem.innerHTML = `${title} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${title}`;
    }

    function handleControl(action) {
      if (action === 'MENU') {
        openSettings();
      }
    }
  </script>
</body>
</html>
